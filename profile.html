<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hammer Strike — Profile</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0d0f1a;
            --surface: #141727;
            --surface2: #1c2136;
            --border: rgba(255, 255, 255, 0.07);
            --gold: #ffd700;
            --gold2: #ff8c00;
            --blue: #64c8ff;
            --text: #ffffff;
            --text2: rgba(255, 255, 255, 0.5);
        }

        html {
            background: #0d0f1a;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);

        }

        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(20, 23, 39, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .page-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--gold);
        }

        .balance-pill {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            padding: 6px 14px;
            font-weight: 800;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }

        .container {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .profile-card {
            background: linear-gradient(135deg, rgba(20, 23, 39, 0.9), rgba(28, 33, 54, 0.9));
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            position: relative;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #141727;
            font-size: 3rem;
            margin: 0 auto 15px;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
        }

        .profile-name {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .profile-level {
            color: var(--gold);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text2);
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--gold);
        }











        .btn-action {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.2s;
        }

        .btn-action:active {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
    <meta name="monetag" content="f15c9aa6cd721474b07b0a0f974d06b8">
    <script src='//libtl.com/sdk.js' data-zone='10676091' data-sdk='show_10676091'></script>
</head>

<body>
    <header>
        <div class="page-title">Profile</div>
        <div class="header-right" style="display:flex; align-items:center; gap:10px;">
            <div class="balance-pill" id="header-balance">
                🪙 0
            </div>
            <div class="menu-btn" onclick="openMenu()"
                style="background: rgba(255, 255, 255, 0.1); border: 1px solid var(--border); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; color: var(--gold);">
                ☰</div>
        </div>
    </header>

    <div class="menu-overlay" id="menu-overlay" onclick="closeMenu()"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); z-index: 290; display: none;">
    </div>
    <div class="side-menu" id="side-menu"
        style="position: fixed; top: 0; right: 0; width: 250px; height: 100%; background: var(--surface); border-left: 1px solid var(--border); box-shadow: -5px 0 20px rgba(0,0,0,0.5); z-index: 300; padding: 20px; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
        <div
            style="font-size: 1.2rem; font-weight: 800; color: var(--gold); margin-bottom: 20px; display:flex; justify-content:space-between; align-items:center;">
            <span>☰ Menu</span>
            <span onclick="closeMenu()" style="cursor:pointer; font-size:1.5rem;">×</span>
        </div>
        <div style="text-align: center; margin-bottom: 20px;  border-bottom: 1px solid rgba(255,255,255,0.05);">
            <div style="width: 60px; height: 60px; margin: 0 auto 10px; border-radius: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 2rem; overflow: hidden; position: relative;"
                id="sm-avatar-container">
                <span id="sm-avatar-emoji">🪨</span>
                <img id="sm-avatar-img" src=""
                    style="display:none; width:100%; height:100%; object-fit:cover; position:absolute; top:0; left:0;">
            </div>
            <div id="sm-name" style="font-weight: 800; font-size: 1.1rem; color: var(--gold);">PlayerOne</div>
            <div id="sm-level" style="font-size: 0.8rem; color: var(--text2); margin-top: 5px;">Level 1</div>
            <div id="sm-coins" style="font-size: 0.9rem; margin-top: 5px; font-weight: bold;">🪙 0</div>
        </div>

        <a href="profile.html" class="menu-item"
            style="display: block; padding: 12px 10px; color: var(--text); text-decoration: none; font-weight: 600; border-bottom: 1px solid var(--border); margin-bottom: 5px;">👤
            Profile</a>
        <a href="user_stone.html" class="menu-item"
            style="display: block; padding: 12px 10px; color: var(--text); text-decoration: none; font-weight: 600; border-bottom: 1px solid var(--border); margin-bottom: 5px;">🏠
            Home</a>
        <a href="upgrade.html" class="menu-item"
            style="display: block; padding: 12px 10px; color: var(--text); text-decoration: none; font-weight: 600; border-bottom: 1px solid var(--border); margin-bottom: 5px;">⚡
            Upgrades</a>
        <a href="daily_task.html" class="menu-item"
            style="display: block; padding: 12px 10px; color: var(--text); text-decoration: none; font-weight: 600; border-bottom: 1px solid var(--border); margin-bottom: 5px;">📋
            Tasks</a>
        <a href="refral.html" class="menu-item"
            style="display: block; padding: 12px 10px; color: var(--text); text-decoration: none; font-weight: 600; border-bottom: 1px solid var(--border); margin-bottom: 5px;">🤝
            Invite</a>
        <a href="withdraw.html" class="menu-item"
            style="display: block; padding: 12px 10px; color: var(--text); text-decoration: none; font-weight: 600; border-bottom: 1px solid var(--border); margin-bottom: 5px;">💳
            Wallet</a>
    </div>
    <script>
        function checkAuth() {
            const isIndex = window.location.pathname.endsWith('index.html') || window.location.pathname.endsWith('/');
            const loggedIn = sessionStorage.getItem('hammerStrikeUserLoggedIn') === 'true';
            const hasData = localStorage.getItem('hammerStrikeSave') !== null;

            if (isIndex) {
                if (loggedIn && hasData) {
                    window.location.href = 'user_stone.html';
                }
            } else {
                if (!loggedIn || !hasData) {
                    window.location.href = 'index.html';
                }
            }
        }
        checkAuth();
        window.addEventListener('storage', (e) => {
            if (e.key === 'hammerStrikeSave' && e.newValue === null) {
                window.location.href = 'index.html';
            }
        });

        function updateSideMenu() {
            try {
                const raw = localStorage.getItem('hammerStrikeSave');
                if (raw) {
                    const parsed = JSON.parse(raw);
                    document.getElementById('sm-name').innerText = parsed.nickname || 'PlayerOne';
                    document.getElementById('sm-level').innerText = `Level ${parsed.level || 1}`;
                    document.getElementById('sm-coins').innerText = `🪙 ${(parsed.coins || 0).toLocaleString()}`;
                    const customPfp = localStorage.getItem('hsCustomAvatar');
                    if (customPfp) {
                        document.getElementById('sm-avatar-img').src = customPfp;
                        document.getElementById('sm-avatar-img').style.display = 'block';
                        document.getElementById('sm-avatar-emoji').style.display = 'none';
                    }
                }
            } catch (e) { }
        }
        function openMenu() {
            document.getElementById('side-menu').style.transform = 'translateX(0)';
            document.getElementById('menu-overlay').style.display = 'block';
            updateSideMenu();
        }
        function closeMenu() {
            document.getElementById('side-menu').style.transform = 'translateX(100%)';
            document.getElementById('menu-overlay').style.display = 'none';
        }
    </script>



    <div class="container">
        <div class="container">
            <div class="profile-card">
                <div class="profile-avatar" style="position: relative; display: inline-flex; overflow: visible;">
                    <div
                        style="width: 80px; height: 80px; border-radius: 20px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; overflow: hidden; position: relative;">
                        <span id="avatar-emoji">💎</span>
                        <img id="avatar-img" src=""
                            style="display:none; width:100%; height:100%; object-fit:cover; position:absolute; top:0; left:0;">
                    </div>
                    <div style="position: absolute; bottom: -5px; right: -5px; background: var(--primary); width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; cursor: pointer; border: 2px solid var(--surface); box-shadow: 0 4px 10px rgba(0,0,0,0.5);"
                        onclick="document.getElementById('avatar-upload').click()">✏️</div>
                    <input type="file" id="avatar-upload" accept="image/*" style="display:none;"
                        onchange="handleAvatarUpload(event)">
                </div>
                <div class="profile-name" id="profile-name">PlayerOne</div>
                <div class="profile-level" id="profile-level">Level 1 Miner</div>

                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">Total Coins</div>
                        <div class="stat-value" id="stat-coins">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Max Energy</div>
                        <div class="stat-value" id="stat-energy">100</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Tap Power</div>
                        <div class="stat-value" id="stat-power">Lvl 1</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Current Rank</div>
                        <div class="stat-value" id="stat-rank">#98</div>
                    </div>
                </div>
            </div>

            <button class="btn-action" onclick="window.location.href='help.html'">
                <span>Help Center</span>
                <span>ℹ️</span>
            </button>
            <button class="btn-action" onclick="window.location.href='contact.html'">
                <span>Contact Us</span>
                <span>📧</span>
            </button>
            <button class="btn-action" onclick="openAccountSettings()">
                <span>Account Settings</span>
                <span>⚙️</span>
            </button>
        </div>

        <!-- ACCOUNT SETTINGS MODAL -->
        <div id="account-modal"
            style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(5px); z-index:999; align-items:center; justify-content:center;">
            <div
                style="background:var(--surface); border:1px solid var(--border); border-radius:15px; padding:25px; width:90%; max-width:350px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 style="color:var(--gold);">Account Settings</h3>
                    <span onclick="closeAccountSettings()"
                        style="cursor:pointer; font-size:1.5rem; color:var(--text2);">×</span>
                </div>

                <div id="unreg-view" style="display:none; text-align:center;">
                    <p style="color:var(--text2); font-size:0.9rem; margin-bottom:20px;">You are currently playing
                        as a
                        Guest. Register an account to secure your progress!</p>
                    <button onclick="window.location.href='index.html'"
                        style="background:linear-gradient(135deg, var(--gold), var(--gold2)); color:#000; font-weight:800; border:none; padding:12px; width:100%; border-radius:8px; cursor:pointer;">Register
                        / Login</button>
                </div>

                <div id="reg-view" style="display:none;">
                    <label style="font-size:0.8rem;color:var(--text2);display:block;margin-bottom:5px;">Username</label>
                    <input type="text" id="edit-user"
                        style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; outline:none;">

                    <label style="font-size:0.8rem;color:var(--text2);display:block;margin-bottom:5px;">New
                        Password</label>
                    <input type="password" id="edit-pass" placeholder="Enter new password"
                        style="width:100%; padding:10px; margin-bottom:20px; border-radius:8px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; outline:none;">

                    <button onclick="saveAccountSettings()"
                        style="background:linear-gradient(135deg, #27ae60, #2ecc71); color:white; font-weight:bold; border:none; padding:12px; width:100%; border-radius:8px; cursor:pointer;">Update
                        Credentials</button>
                    <button onclick="logoutAccount()"
                        style="background:transparent; color:#e74c3c; border:1px solid #e74c3c; padding:12px; width:100%; border-radius:8px; cursor:pointer; margin-top:10px; font-weight:bold;">Log
                        Out</button>
                    <button id="admin-access-btn" onclick="openAdminFirstTime()"
                        style="display:none; background:transparent; color:var(--gold); border:1px solid var(--gold); padding:12px; width:100%; border-radius:8px; cursor:pointer; margin-top:10px; font-weight:bold;">Admin
                        Access (First Time)</button>
                </div>
            </div>
        </div>

        <script>
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.expand();
                window.Telegram.WebApp.ready();
            }

            function loadProfile() {
                const raw = localStorage.getItem('hammerStrikeSave');
                if (raw) {
                    try {
                        const parsed = JSON.parse(raw);

                        document.getElementById('header-balance').innerText = `🪙 ${(parsed.coins || 0).toLocaleString()}`;
                        document.getElementById('profile-name').innerText = parsed.nickname || 'PlayerOne';
                        document.getElementById('profile-level').innerText = `Level ${parsed.level || 1} Miner`;

                        document.getElementById('stat-coins').innerText = (parsed.coins || 0).toLocaleString();
                        document.getElementById('stat-energy').innerText = parsed.maxEnergy || 100;
                        document.getElementById('stat-power').innerText = `Lvl ${parsed.tapPowerLevel || 1}`;
                        document.getElementById('stat-rank').innerText = '#' + Math.max(1, 105 - ((parsed.level || 1) * 2));

                        const customPfp = localStorage.getItem('hsCustomAvatar');
                        if (customPfp) {
                            document.getElementById('avatar-img').src = customPfp;
                            document.getElementById('avatar-img').style.display = 'block';
                            document.getElementById('avatar-emoji').style.display = 'none';
                        } else {
                            document.getElementById('avatar-img').style.display = 'none';
                            document.getElementById('avatar-emoji').style.display = 'block';
                        }

                    } catch (e) { }
                }
            }

            loadProfile();
            window.addEventListener('storage', (e) => {
                if (e.key === 'hammerStrikeSave') {
                    if (e.newValue === null) {
                        window.location.href = 'index.html';
                    } else {
                        loadProfile();
                    }
                }
            });
            setInterval(loadProfile, 1000);

            function handleAvatarUpload(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function (event) {
                    const imgData = event.target.result;
                    localStorage.setItem('hsCustomAvatar', imgData);
                    loadProfile();
                    updateSideMenu();
                };
                reader.readAsDataURL(file);
            }

            function openAccountSettings() {
                document.getElementById('account-modal').style.display = 'flex';
                if (localStorage.getItem('hammerStrikeUserRegistered') === 'true') {
                    document.getElementById('reg-view').style.display = 'block';
                    document.getElementById('unreg-view').style.display = 'none';
                    document.getElementById('edit-user').value = localStorage.getItem('hsGlobalUsername') || '';

                    if (!localStorage.getItem('hsAdminUser')) {
                        document.getElementById('admin-access-btn').style.display = 'block';
                    } else {
                        document.getElementById('admin-access-btn').style.display = 'none';
                    }
                } else {
                    document.getElementById('reg-view').style.display = 'none';
                    document.getElementById('unreg-view').style.display = 'block';
                }
            }

            function openAdminFirstTime() {
                // Auto-login logic for first time goes here
                localStorage.setItem('hsFirstTimeAdmin', 'true'); // Flag to trigger 5sec change popup
                window.location.href = 'admin.html';
            }

            function closeAccountSettings() {
                document.getElementById('account-modal').style.display = 'none';
            }

            function saveAccountSettings() {
                const nu = document.getElementById('edit-user').value.trim();
                const np = document.getElementById('edit-pass').value.trim();
                if (!nu || !np) {
                    alert("Please enter a username and a new password.");
                    return;
                }
                localStorage.setItem('hsGlobalUsername', nu);
                localStorage.setItem('hsGlobalPassword', np);
                const save = JSON.parse(localStorage.getItem('hammerStrikeSave') || '{}');
                save.nickname = nu;
                localStorage.setItem('hammerStrikeSave', JSON.stringify(save));
                alert("Credentials updated successfully!");
                closeAccountSettings();
                loadProfile();
            }

            function logoutAccount() {
                sessionStorage.removeItem('hammerStrikeUserLoggedIn');
                window.location.href = 'index.html';
            }
        </script>
        <!-- Supabase System -->
        <script type="module">
            import { saveToCloud } from './supabase-sync.js';
            window.saveToCloud = saveToCloud;

            function sync() {
                const username = localStorage.getItem('hsGlobalUsername');
                if (username && window.saveToCloud) {
                    window.saveToCloud(username);
                }
            }

            // Sync every 2 minutes
            setInterval(sync, 120000);

            // Sync on page hide/close
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'hidden') {
                    sync();
                }
            });
        </script>
</body>

</html>

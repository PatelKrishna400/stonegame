<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="monetag" content="f15c9aa6cd721474b07b0a0f974d06b8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hammer Strike — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0d0f1a;
            --surface: #141727;
            --border: rgba(255, 255, 255, 0.07);
            --gold: #ffd700;
            --gold2: #ff8c00;
            --text: #ffffff;
            --text2: rgba(255, 255, 255, 0.5);
        }

        body {
            background: radial-gradient(circle at 50% 50%, #1a1e36, #0d0f1a);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        .logo {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .title {
            color: var(--gold);
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--text2);
            font-size: 0.85rem;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text2);
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            border: none;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .btn-login {
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: #0d0f1a;
        }

        .btn-register {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--border);
        }

        .skip-link {
            color: var(--text2);
            font-size: 0.8rem;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
        }
    </style>
    <meta name="monetag" content="f15c9aa6cd721474b07b0a0f974d06b8">
    <script src='//libtl.com/sdk.js' data-zone='10676091' data-sdk='show_10676091'></script>
</head>

<body>
    <div class="login-card">
        <div class="logo">⛏️</div>
        <div class="title">User Login</div>
        <div class="subtitle" id="subtitle">Log in or create a new account to secure your progress.</div>

        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <div id="reg-phone-group" style="display:none;" class="input-group">
            <label>Phone Number (Unique ID)</label>
            <input type="text" id="phone" placeholder="Enter phone number">
        </div>

        <button class="btn btn-login" onclick="handleLogin()">Login</button>
        <button class="btn btn-login" onclick="handleLogin()">Login</button>
        <button id="btn-reg-toggle" class="btn btn-register" onclick="toggleRegisterMode()">New Player?
            Register</button>
        <button id="btn-reg-submit" class="btn btn-register" style="display:none; background:var(--gold); color:#000;"
            onclick="handleRegister()">Complete Registration</button>

        <div style="margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px;">
            <button
                onclick="sessionStorage.setItem('hammerStrikeUserLoggedIn', 'true'); window.location.href='user_stone.html'"
                class="btn btn-secondary"
                style="background: rgba(39, 174, 96, 0.1); border: 1px solid rgba(39, 174, 96, 0.3); color: #2ecc71; margin-bottom: 5px;">
                🎮 Play Game (Home)
            </button>
            <div style="color: var(--text2); font-size: 0.75rem; margin-top: 5px;">Admin? Use Admin Creds to log in.
            </div>
        </div>
    </div>

    <script>
        // Check if user is forced to login
        if (localStorage.getItem('hammerStrikeUserRegistered') === 'true') {
            document.getElementById('skip-link').style.display = 'none';
            document.querySelector('.btn-register').style.display = 'none';
            document.getElementById('subtitle').innerText = "Please log in to continue.";
        }

        function toggleRegisterMode() {
            document.getElementById('reg-phone-group').style.display = 'block';
            document.getElementById('btn-reg-toggle').style.display = 'none';
            document.getElementById('btn-reg-submit').style.display = 'block';
            document.getElementById('subtitle').innerText = "Create a new account with your phone number.";
        }

        function handleRegister() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const n = document.getElementById('phone').value.trim();

            if (!u || !p || !n) {
                alert("Please enter username, password, and phone number.");
                return;
            }

            if (localStorage.getItem('hammerStrikeUserRegistered') === 'true') {
                alert("This device is already registered. Please login or edit from profile.");
                return;
            }

            const userId = n;
            localStorage.setItem('hsGlobalUsername', u);
            localStorage.setItem('hsGlobalPassword', p);
            localStorage.setItem('hsGlobalPhone', n);
            localStorage.setItem('hsGlobalUserId', userId);
            localStorage.setItem('hammerStrikeUserRegistered', 'true');
            sessionStorage.setItem('hammerStrikeUserLoggedIn', 'true');

            // Sync internal save nickname
            let existingSave = null;
            try { existingSave = JSON.parse(localStorage.getItem('hammerStrikeSave') || '{}'); } catch (e) { existingSave = {}; }

            // Ensure basic stats exist
            if (typeof existingSave.coins !== 'number') existingSave.coins = 0;
            if (!existingSave.level) existingSave.level = 1;

            existingSave.nickname = u;
            existingSave.phone = n;
            existingSave.userId = userId;
            localStorage.setItem('hammerStrikeSave', JSON.stringify(existingSave));

            // Sync to cloud
            if (window.saveToCloud) window.saveToCloud(u);

            alert("Registration successful! Welcome " + u);
            window.location.href = 'user_stone.html';
        }

        function handleLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();

            if (!u || !p) {
                alert("Please enter both username and password.");
                return;
            }

            // 1. Check Admin Credentials first
            const customAdminUser = localStorage.getItem('hsAdminUser');
            const customAdminPass = localStorage.getItem('hsAdminPass');

            if (!customAdminUser && u === 'admin' && p === 'admin@123') {
                localStorage.setItem('hsFirstTimeAdmin', 'true');
                window.location.href = 'admin.html';
                return;
            } else if (customAdminUser && u === customAdminUser && p === customAdminPass) {
                localStorage.setItem('hammerStrikeAdminLoggedIn', 'true');
                window.location.href = 'admin_dashboard.html';
                return;
            }

            // 2. Check Standard User Credentials
            const storedU = localStorage.getItem('hsGlobalUsername');
            const storedP = localStorage.getItem('hsGlobalPassword');

            if (!storedU) {
                alert("No registered account found. Please register first.");
                return;
            }

            if (u === storedU && p === storedP) {
                sessionStorage.setItem('hammerStrikeUserLoggedIn', 'true');

                // Merge Guest data into User data if applicable
                let currentSave = null;
                try { currentSave = JSON.parse(localStorage.getItem('hammerStrikeSave') || '{}'); } catch (e) { currentSave = {}; }

                if (!currentSave.nickname || currentSave.nickname === 'Guest Player') {
                    currentSave.nickname = u;
                    localStorage.setItem('hammerStrikeSave', JSON.stringify(currentSave));
                } else if (!localStorage.getItem('hammerStrikeSave')) {
                    // Fallback for empty state
                    localStorage.setItem('hammerStrikeSave', JSON.stringify({
                        coins: 0, level: 1, nickname: u, tapsPerHour: 100, lastEnergy: 500, maxEnergy: 500, lastRefresh: Date.now()
                    }));
                }
                // Optional Cloud Sync on login
                if (window.loadFromCloud) {
                    const btn = document.querySelector('.btn-login');
                    btn.innerText = "Syncing...";
                    btn.disabled = true;

                    window.loadFromCloud(u).finally(() => {
                        window.location.href = 'user_stone.html';
                    });
                } else {
                    window.location.href = 'user_stone.html';
                }
            } else {
                alert("Invalid username or password!");
            }
        }
    </script>
    
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="monetag" content="f15c9aa6cd721474b07b0a0f974d06b8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hammer Strike — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0d0f1a;
            --surface: #141727;
            --border: rgba(255, 255, 255, 0.07);
            --gold: #ffd700;
            --gold2: #ff8c00;
            --text: #ffffff;
            --text2: rgba(255, 255, 255, 0.5);
            --error: #ff4d4d;
            --success: #2ecc71;
        }

        body {
            background: radial-gradient(circle at 50% 50%, #1a1e36, #0d0f1a);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animated background particles */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0;
            animation: float-particle 6s infinite;
        }

        @keyframes float-particle {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0);
            }

            10% {
                opacity: 0.6;
            }

            90% {
                opacity: 0.3;
            }

            100% {
                opacity: 0;
                transform: translateY(-20px) scale(1);
            }
        }

        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 44px 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 215, 0, 0.05);
            animation: card-in 0.5s ease;
        }

        @keyframes card-in {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 8px;
            display: block;
            animation: hammer-bounce 2s ease-in-out infinite;
        }

        @keyframes hammer-bounce {

            0%,
            100% {
                transform: rotate(-10deg);
            }

            50% {
                transform: rotate(10deg);
            }
        }

        .title {
            color: var(--gold);
            font-size: 1.9rem;
            font-weight: 800;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text2);
            font-size: 0.85rem;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .tab-switcher {
            display: flex;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 9px;
            border: none;
            background: transparent;
            color: var(--text2);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 7px;
            transition: all 0.25s ease;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: #0d0f1a;
        }

        .input-group {
            text-align: left;
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 0.78rem;
            color: var(--text2);
            margin-bottom: 6px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .input-group input {
            width: 100%;
            padding: 13px 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input:focus {
            border-color: rgba(255, 215, 0, 0.4);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.08);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .btn {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            border: none;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
            margin-top: 4px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: #0d0f1a;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.25);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 28px rgba(255, 215, 0, 0.35);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .msg-box {
            margin-top: 14px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            display: none;
            text-align: left;
        }

        .msg-box.error {
            background: rgba(255, 77, 77, 0.12);
            border: 1px solid rgba(255, 77, 77, 0.3);
            color: var(--error);
        }

        .msg-box.success {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.3);
            color: var(--success);
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-top-color: #0d0f1a;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .forgot-link {
            display: block;
            text-align: right;
            color: var(--text2);
            font-size: 0.78rem;
            margin-top: -10px;
            margin-bottom: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: var(--gold);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 18px 0;
            color: var(--text2);
            font-size: 0.75rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .reset-section {
            display: none;
        }

        .back-link {
            display: block;
            margin-top: 14px;
            color: var(--text2);
            font-size: 0.82rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--gold);
        }

        /* Loading overlay */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #0d0f1a;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            transition: opacity 0.4s;
        }

        #loading-overlay .big-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 215, 0, 0.15);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        #loading-overlay p {
            color: var(--text2);
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <!-- Loading overlay while Firebase auth checks session -->
    <div id="loading-overlay">
        <div class="big-spinner"></div>
        <p>Checking session…</p>
    </div>

    <!-- Background floating particles -->
    <div class="bg-particles" id="particles"></div>

    <div class="login-card">
        <span class="logo">⛏️</span>
        <div class="title">Hammer Strike</div>
        <div class="subtitle" id="subtitle">Sign in to secure your progress and climb the leaderboard.</div>

        <!-- Tab Switcher (Login / Register) -->
        <div class="tab-switcher" id="tab-switcher">
            <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Register</button>
        </div>

        <!-- ── LOGIN FORM ── -->
        <div id="login-form">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
            </div>
            <a class="forgot-link" onclick="showReset()">Forgot password?</a>
            <button class="btn btn-primary" id="btn-login" onclick="handleLogin()">Login</button>
            <div class="msg-box" id="login-msg"></div>
        </div>

        <!-- ── REGISTER FORM ── -->
        <div id="register-form" style="display:none;">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="reg-username" placeholder="Your in-game name">
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Min 6 characters" autocomplete="new-password">
            </div>
            <button class="btn btn-primary" id="btn-register" onclick="handleRegister()">Create Account</button>
            <div class="msg-box" id="register-msg"></div>
        </div>

        <!-- ── RESET PASSWORD FORM ── -->
        <div id="reset-form" class="reset-section">
            <div class="subtitle">Enter your email to receive a password reset link.</div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="reset-email" placeholder="you@example.com">
            </div>
            <button class="btn btn-primary" id="btn-reset" onclick="handleReset()">Send Reset Link</button>
            <div class="msg-box" id="reset-msg"></div>
            <span class="back-link" onclick="backToLogin()">← Back to Login</span>
        </div>
    </div>

    <!-- Firebase SDK (v9 compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        // ═══════════════════════════════════════════════
        //  FIREBASE CONFIGURATION
        // ═══════════════════════════════════════════════
        const firebaseConfig = {
            apiKey: "AIzaSyB1FmNCMfgpsLmL8HiLwNY5y8nL2UbUnF0",
            authDomain: "telegram-stone-c20de.firebaseapp.com",
            databaseURL: "https://telegram-stone-c20de-default-rtdb.firebaseio.com",
            projectId: "telegram-stone-c20de",
            storageBucket: "telegram-stone-c20de.firebasestorage.app",
            messagingSenderId: "831340904421",
            appId: "1:831340904421:web:34b4d88846b76716e8390c",
            measurementId: "G-0WCY9B0J12"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();  // Realtime Database

        // ═══════════════════════════════════════════════
        //  ADMIN UID — this user goes to admin dashboard
        // ═══════════════════════════════════════════════
        const ADMIN_UID = 'QizamN2snrTd7JXgakSsED2JJaw2';

        function getRedirectUrl(uid) {
            return uid === ADMIN_UID ? 'admin_dashboard.html' : 'user_stone.html';
        }

        // ═══════════════════════════════════════════════
        //  AUTH STATE — auto-redirect if already signed in
        // ═══════════════════════════════════════════════
        auth.onAuthStateChanged(user => {
            const overlay = document.getElementById('loading-overlay');
            if (user) {
                // Already logged in → redirect based on role
                window.location.href = getRedirectUrl(user.uid);
            } else {
                // Not logged in → show login UI
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 400);
            }
        });

        // ═══════════════════════════════════════════════
        //  UI HELPERS
        // ═══════════════════════════════════════════════
        function switchTab(tab) {
            document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
            clearMessages();
        }

        function showReset() {
            document.getElementById('tab-switcher').style.display = 'none';
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('reset-form').style.display = 'block';
        }

        function backToLogin() {
            document.getElementById('tab-switcher').style.display = 'flex';
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('reset-form').style.display = 'none';
        }

        function setMsg(id, text, type) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = `msg-box ${type}`;
            el.style.display = 'block';
        }

        function clearMessages() {
            ['login-msg', 'register-msg', 'reset-msg'].forEach(id => {
                const el = document.getElementById(id);
                el.style.display = 'none';
                el.textContent = '';
            });
        }

        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> Please wait…';
            } else {
                btn.disabled = false;
                btn.innerHTML = btnId === 'btn-login' ? 'Login'
                    : btnId === 'btn-register' ? 'Create Account'
                        : 'Send Reset Link';
            }
        }

        function friendlyError(code) {
            const map = {
                'auth/user-not-found': 'No account found with this email.',
                'auth/wrong-password': 'Incorrect password. Please try again.',
                'auth/invalid-email': 'Please enter a valid email address.',
                'auth/email-already-in-use': 'This email is already registered. Try logging in.',
                'auth/weak-password': 'Password must be at least 6 characters.',
                'auth/too-many-requests': 'Too many attempts. Try again later.',
                'auth/network-request-failed': 'Network error. Check your connection.',
            };
            return map[code] || 'An error occurred. Please try again.';
        }

        // ═══════════════════════════════════════════════
        //  LOGIN
        // ═══════════════════════════════════════════════
        async function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-password').value;

            if (!email || !pass) {
                setMsg('login-msg', 'Please enter your email and password.', 'error');
                return;
            }

            setLoading('btn-login', true);
            clearMessages();

            try {
                const cred = await auth.signInWithEmailAndPassword(email, pass);
                // Save email to localStorage for game pages
                localStorage.setItem('hsUserEmail', cred.user.email);
                localStorage.setItem('hsUserId', cred.user.uid);
                // Load user profile from Realtime Database
                const snap = await db.ref('users/' + cred.user.uid).get();
                if (snap.exists()) {
                    const data = snap.val();
                    localStorage.setItem('hsGlobalUsername', data.username || email.split('@')[0]);
                    localStorage.setItem('hammerStrikeSave', JSON.stringify(data.save || {}));
                }
                sessionStorage.setItem('hammerStrikeUserLoggedIn', 'true');
                if (cred.user.uid === ADMIN_UID) {
                    localStorage.setItem('hammerStrikeAdminLoggedIn', 'true');
                }
                window.location.href = getRedirectUrl(cred.user.uid);
            } catch (err) {
                setLoading('btn-login', false);
                setMsg('login-msg', friendlyError(err.code), 'error');
            }
        }

        // ═══════════════════════════════════════════════
        //  REGISTER
        // ═══════════════════════════════════════════════
        async function handleRegister() {
            const username = document.getElementById('reg-username').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-password').value;

            if (!username || !email || !pass) {
                setMsg('register-msg', 'Please fill in all fields.', 'error');
                return;
            }
            if (username.length < 3) {
                setMsg('register-msg', 'Username must be at least 3 characters.', 'error');
                return;
            }

            setLoading('btn-register', true);
            clearMessages();

            try {
                const cred = await auth.createUserWithEmailAndPassword(email, pass);

                // Update display name
                await cred.user.updateProfile({ displayName: username });

                // Create Realtime Database profile
                const initialSave = {
                    coins: 0, level: 1,
                    tapsPerHour: 100,
                    lastEnergy: 500, maxEnergy: 500,
                    lastRefresh: Date.now()
                };
                await db.ref('users/' + cred.user.uid).set({
                    username: username,
                    email: email,
                    uid: cred.user.uid,
                    save: initialSave,
                    createdAt: new Date().toISOString()
                });

                // Persist locally
                localStorage.setItem('hsUserEmail', email);
                localStorage.setItem('hsUserId', cred.user.uid);
                localStorage.setItem('hsGlobalUsername', username);
                localStorage.setItem('hammerStrikeSave', JSON.stringify(initialSave));
                sessionStorage.setItem('hammerStrikeUserLoggedIn', 'true');

                window.location.href = getRedirectUrl(cred.user.uid);
            } catch (err) {
                setLoading('btn-register', false);
                setMsg('register-msg', friendlyError(err.code), 'error');
            }
        }

        // ═══════════════════════════════════════════════
        //  PASSWORD RESET
        // ═══════════════════════════════════════════════
        async function handleReset() {
            const email = document.getElementById('reset-email').value.trim();
            if (!email) {
                setMsg('reset-msg', 'Please enter your email.', 'error');
                return;
            }

            setLoading('btn-reset', true);
            clearMessages();

            try {
                await auth.sendPasswordResetEmail(email);
                setMsg('reset-msg', '✅ Reset link sent! Check your inbox (and spam folder).', 'success');
            } catch (err) {
                setMsg('reset-msg', friendlyError(err.code), 'error');
            } finally {
                setLoading('btn-reset', false);
            }
        }

        // ═══════════════════════════════════════════════
        //  PARTICLES
        // ═══════════════════════════════════════════════
        const container = document.getElementById('particles');
        for (let i = 0; i < 18; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDelay = Math.random() * 6 + 's';
            p.style.animationDuration = (4 + Math.random() * 4) + 's';
            p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
            container.appendChild(p);
        }

        // Enter key support
        document.addEventListener('keydown', e => {
            if (e.key !== 'Enter') return;
            if (document.getElementById('login-form').style.display !== 'none') handleLogin();
            else if (document.getElementById('register-form').style.display !== 'none') handleRegister();
            else if (document.getElementById('reset-form').style.display !== 'none') handleReset();
        });
    </script>

    <script src='//libtl.com/sdk.js' data-zone='10676091' data-sdk='show_10676091'></script>
</body>

</html>

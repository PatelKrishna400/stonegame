<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Game — Admin Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0d0f1a;
            --surface: #141727;
            --surface2: #1c2136;
            --border: rgba(255, 255, 255, 0.07);
            --gold: #ffd700;
            --gold2: #ff8c00;
            --blue: #64c8ff;
            --pink: #ff64c8;
            --green: #27ae60;
            --red: #e74c3c;
            --purple: #8e44ad;
            --text: #ffffff;
            --text2: rgba(255, 255, 255, 0.5);
            --text3: rgba(255, 255, 255, 0.25);
        }

        html {
            background: #0d0f1a;
        }

        body {
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 20px;
            background: rgba(20, 23, 39, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .main {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 20px;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .page-subtitle {
            color: var(--text2);
            font-size: 0.8rem;
            margin-top: 2px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 20px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 215, 0, 0.2);
        }

        .stat-label {
            color: var(--text2);
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.9rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 6px;
        }

        .stat-sub {
            font-size: 0.72rem;
            color: var(--text2);
        }

        .stat-icon {
            position: absolute;
            top: 16px;
            right: 18px;
            font-size: 1.6rem;
            opacity: 0.6;
        }

        .section-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .danger-btn {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.35);
            border-radius: 10px;
            padding: 8px 16px;
            color: #e74c3c;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
    </style>
    <meta name="monetag" content="f15c9aa6cd721474b07b0a0f974d06b8">
</head>

<body>

    <header
        style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(20, 23, 39, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.07); position: sticky; top: 0; z-index: 2000;">
        <div class="logo">Admin Dashboard</div>
        <div class="header-right" style="display:flex; align-items:center; gap:10px;">
            <button class="logout-btn" onclick="adminLogout()"
                style="background: rgba(231, 76, 60, 0.1); border: 1px solid rgba(231, 76, 60, 0.35); padding: 6px 12px; border-radius: 8px; color: #e74c3c; font-size: 0.8rem; font-weight: 700; cursor: pointer; text-decoration: none;">Logout</button>
            <div class="menu-btn" onclick="openMenu()"
                style="background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.07); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; color: #ffd700;">
                ☰</div>
        </div>
    </header>

    <main class="main">
        <div class="page active">
            <div class="page-header">
                <div>
                    <div class="page-title">📊 Overview</div>
                    <div class="page-subtitle" id="lastSyncText">Real-time cloud data statistics</div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card" style="--card-accent:rgba(255,215,0,0.1);">
                    <div class="stat-icon">👥</div>
                    <div class="stat-label">Total Users</div>
                    <div class="stat-value" id="dash-users" style="color:#ffd700;">0</div>
                    <div class="stat-sub">Registered players</div>
                </div>
                <div class="stat-card" style="--card-accent:rgba(100,200,255,0.08);">
                    <div class="stat-icon">🪙</div>
                    <div class="stat-label">Coins Mined</div>
                    <div class="stat-value" id="dash-coins" style="color:#64c8ff;">0</div>
                    <div class="stat-sub">Across all accounts</div>
                </div>
                <div class="stat-card" style="--card-accent:rgba(231,76,60,0.08);">
                    <div class="stat-icon">💸</div>
                    <div class="stat-label">Withdrawals</div>
                    <div class="stat-value" id="dash-withdraws" style="color:#e74c3c;">0</div>
                    <div class="stat-sub">Pending requests</div>
                </div>
                <div class="stat-card" style="--card-accent:rgba(155,89,182,0.08);">
                    <div class="stat-icon">📺</div>
                    <div class="stat-label">Total Ads</div>
                    <div class="stat-value" id="dash-ads" style="color:#9b59b6;">0</div>
                    <div class="stat-sub">Cumulative views</div>
                </div>
            </div>

            <div class="section-card">
                <div class="section-title">📅 Monthly User Activity</div>
                <div style="height:250px; position:relative;">
                    <canvas id="monthlyChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script>
        function fmt(n) { return Number(n || 0).toLocaleString(); }
        function loadWithdrawals() {
            const raw = localStorage.getItem('hammerStrikeWithdrawals');
            if (!raw) return [];
            try { return JSON.parse(raw); } catch (e) { return []; }
        }

        let myChart = null;

        function render() {
            const allUsers = JSON.parse(localStorage.getItem('hsAdminUsersList') || '[]');
            const du = document.getElementById('dash-users');
            if (du) du.textContent = allUsers.length.toString();

            const totalCoins = allUsers.reduce((sum, u) => sum + (u.coins || 0), 0);
            const dc = document.getElementById('dash-coins');
            if (dc) dc.textContent = fmt(totalCoins);

            const totalAds = allUsers.reduce((sum, u) => sum + (u.allData?.adsWatched || 0), 0);
            const da = document.getElementById('dash-ads');
            if (da) da.textContent = fmt(totalAds);

            const reqs = loadWithdrawals();
            const dw = document.getElementById('dash-withdraws');
            if (dw) dw.textContent = reqs.filter(r => r.status === 'pending').length.toString();

            renderChart(allUsers);
        }

        function renderChart(users) {
            const ctx = document.getElementById('monthlyChart').getContext('2d');
            const days = Array.from({ length: 30 }, (_, i) => i + 1);
            const counts = Array(30).fill(0);

            users.forEach(u => {
                if (u.lastSave) {
                    const d = new Date(u.lastSave).getDate();
                    if (d > 0 && d <= 30) counts[d - 1]++;
                }
            });

            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: days,
                    datasets: [{
                        label: 'Active Users',
                        data: counts,
                        borderColor: '#ffd700',
                        backgroundColor: 'rgba(255, 215, 0, 0.1)',
                        fill: true, tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.5)', stepSize: 1 } },
                        x: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.5)' } }
                    }
                }
            });
        }

        function adminLogout() {
            localStorage.removeItem('hammerStrikeAdminLoggedIn');
            window.location.href = 'index.html';
        }

        function openMenu() { document.getElementById('side-menu').style.transform = 'translateX(0)'; document.getElementById('menu-overlay').style.display = 'block'; }
        function closeMenu() { document.getElementById('side-menu').style.transform = 'translateX(100%)'; document.getElementById('menu-overlay').style.display = 'none'; }

        render();
        setInterval(render, 5000);
    </script>

    <div class="menu-overlay" id="menu-overlay" onclick="closeMenu()"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); z-index: 2900; display: none;">
    </div>
    <div class="side-menu" id="side-menu"
        style="position: fixed; top: 0; right: 0; width: 250px; height: 100%; background: #141727; border-left: 1px solid rgba(255, 255, 255, 0.07); box-shadow: -5px 0 20px rgba(0,0,0,0.5); z-index: 3000; padding: 20px; transform: translateX(100%); transition: transform 0.3s; color: #ffffff; font-family: 'Inter', sans-serif;">
        <div
            style="font-size: 1.2rem; font-weight: 800; color: #ffd700; margin-bottom: 20px; display:flex; justify-content:space-between; align-items:center;">
            <span>☰ Menu</span>
            <span onclick="closeMenu()" style="cursor:pointer; font-size:1.5rem;">×</span>
        </div>
        <a href="admin_dashboard.html" class="menu-item"
            style="display: block; padding: 12px 10px; color: #ffffff; text-decoration: none; font-weight: 600; border-bottom: 1px solid rgba(255, 255, 255, 0.07); margin-bottom: 5px;">📊
            Dashboard</a>
        <a href="admin_usersdata.html" class="menu-item"
            style="display: block; padding: 12px 10px; color: #ffffff; text-decoration: none; font-weight: 600; border-bottom: 1px solid rgba(255, 255, 255, 0.07); margin-bottom: 5px;">👥
            Users</a>
        <a href="admin_task.html" class="menu-item"
            style="display: block; padding: 12px 10px; color: #ffffff; text-decoration: none; font-weight: 600; border-bottom: 1px solid rgba(255, 255, 255, 0.07); margin-bottom: 5px;">📋
            Tasks</a>
        <a href="admin_leaderboard.html" class="menu-item"
            style="display: block; padding: 12px 10px; color: #ffffff; text-decoration: none; font-weight: 600; border-bottom: 1px solid rgba(255, 255, 255, 0.07); margin-bottom: 5px;">🏆
            Rankings</a>
        <a href="admin_withdraw.html" class="menu-item"
            style="display: block; padding: 12px 10px; color: #ffffff; text-decoration: none; font-weight: 600; border-bottom: 1px solid rgba(255, 255, 255, 0.07); margin-bottom: 5px;">💸
            Funds</a>
        <a href="user_stone.html" class="menu-item"
            style="display: block; padding: 12px 10px; color: #ffd700; text-decoration: none; font-weight: 700; margin-top: 20px;">🎮
            Exit to Game</a>
    </div>

    
</body>

</html>

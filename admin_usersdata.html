<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Game — Admin Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0d0f1a;
            --surface: #141727;
            --surface2: #1c2136;
            --border: rgba(255, 255, 255, 0.07);
            --gold: #ffd700;
            --gold2: #ff8c00;
            --blue: #64c8ff;
            --pink: #ff64c8;
            --green: #27ae60;
            --red: #e74c3c;
            --purple: #8e44ad;
            --text: #ffffff;
            --text2: rgba(255, 255, 255, 0.5);
            --text3: rgba(255, 255, 255, 0.25);
        }

        html {
            background: #0d0f1a;
        }

        body {
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        /* HEADER & BOTTOM NAV */
        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 20px;
            background: rgba(20, 23, 39, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .main {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 20px;
        }











        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .page-subtitle {
            color: var(--text2);
            font-size: 0.8rem;
            margin-top: 2px;
        }

        /* COMPONENTS */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 20px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 215, 0, 0.2);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, var(--card-accent, rgba(255, 215, 0, 0.08)), transparent 70%);
            border-radius: 50%;
        }

        .stat-label {
            color: var(--text2);
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.9rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 6px;
        }

        .stat-sub {
            font-size: 0.72rem;
            color: var(--text2);
        }

        .stat-icon {
            position: absolute;
            top: 16px;
            right: 18px;
            font-size: 1.6rem;
            opacity: 0.6;
        }

        .section-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .grid-2 {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .detail-table {
            width: 100%;
            border-collapse: collapse;
        }

        .detail-table tr {
            border-bottom: 1px solid var(--border);
        }

        .detail-table tr:last-child {
            border-bottom: none;
        }

        .detail-table td,
        .detail-table th {
            padding: 11px 0;
            font-size: 0.83rem;
            color: white;
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .badge-green {
            background: rgba(39, 174, 96, 0.2);
            color: #2ecc71;
        }

        .badge-red {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }

        .badge-gray {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text2);
        }

        .danger-btn {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.35);
            border-radius: 10px;
            padding: 8px 16px;
            color: #e74c3c;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .danger-btn:hover {
            background: rgba(231, 76, 60, 0.25);
        }

        .quest-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .quest-row:last-child {
            border-bottom: none;
        }

        .quest-icon {
            font-size: 1.3rem;
        }

        .quest-name {
            font-size: 0.83rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--gold);
        }

        .quest-pct {
            font-size: 0.72rem;
            color: var(--text2);
        }

        input {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body>


    <header
        style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(20, 23, 39, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.07); position: sticky; top: 0; z-index: 2000;">
        <div class="logo"
            style="font-size: 1.2rem; font-weight: 800; color: #ffd700; letter-spacing: 2px; text-transform: uppercase;">
            Krishna Admin</div>
        <div class="header-right" style="display:flex; align-items:center; gap:10px;">
            <button class="logout-btn" onclick="adminLogout()"
                style="background: rgba(231, 76, 60, 0.1); border: 1px solid rgba(231, 76, 60, 0.35); padding: 6px 12px; border-radius: 8px; color: #e74c3c; font-size: 0.8rem; font-weight: 700; cursor: pointer; text-decoration: none;">Logout</button>
            <div class="menu-btn" onclick="openMenu()"
                style="background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.07); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; color: #ffd700;">
                ☰</div>
        </div>
    </header>



    <main class="main">
        <div class="page active">
            <div class="page-header">
                <div>
                    <div class="page-title">👥 User Data</div>
                    <div class="page-subtitle">View dynamic player data & delete accounts</div>
                </div>
            </div>

            <div class="section-card">
                <div style="display:flex; justify-content: space-between; margin-bottom: 20px;">
                    <div style="flex:1; margin-right: 10px;">
                        <input type="text" placeholder="Search user by Nickname..."
                            style="width:100%; padding:10px; border-radius:8px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; outline:none; font-family:'Inter';">
                    </div>
                    <button class="danger-btn"
                        style="background:var(--gold); border:none; color:#1a1a2e; padding:10px 20px;">Search</button>
                </div>
                <table class="detail-table" style="text-align:left;">
                    <thead>
                        <tr style="color:var(--gold);">
                            <th style="padding:10px;">S.No</th>
                            <th>Level/Stage</th>
                            <th>Name</th>
                            <th>Coin</th>
                            <th style="text-align:right;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody">
                        <tr>
                            <td colspan="6" style="text-align:center;color:var(--text2);padding:20px;">Loading data from
                                game save...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>

    <script>
        function loadSave() {
            const raw = localStorage.getItem('hammerStrikeSave');
            if (!raw) return null;
            try { return JSON.parse(raw); } catch (e) { return null; }
        }
        function fmt(n) { return Number(n || 0).toLocaleString(); }

        function loadTasks() {
            const raw = localStorage.getItem('hammerStrikeAdminTasks');
            if (!raw) return [];
            try { return JSON.parse(raw); } catch (e) { return []; }
        }
        function saveTasks(tasks) {
            localStorage.setItem('hammerStrikeAdminTasks', JSON.stringify(tasks));
        }

        function loadWithdrawals() {
            const raw = localStorage.getItem('hammerStrikeWithdrawals');
            if (!raw) return [];
            try { return JSON.parse(raw); } catch (e) { return []; }
        }
        function saveWithdrawals(reqs) {
            localStorage.setItem('hammerStrikeWithdrawals', JSON.stringify(reqs));
        }

        let isRenderedOnce = false;

        function render() {
            // Load cloud-synced users or fallback to local
            const cloudUsers = JSON.parse(localStorage.getItem('hsAdminUsersList') || '[]');
            const localData = loadSave();

            let allUsers = [...cloudUsers];

            // If local player isn't in cloud yet, add them (if registered)
            if (localData && localData.userId && !allUsers.some(u => u.nickname === localData.nickname)) {
                allUsers.push({
                    username: localData.nickname,
                    nickname: localData.nickname,
                    userId: localData.userId,
                    coins: localData.coins,
                    level: localData.level,
                    lastSave: new Date().toISOString()
                });
            }

            // Exclude guests
            allUsers = allUsers.filter(u => u.nickname && u.nickname !== 'Guest Player');

            const timeEl = document.getElementById('lastSyncTime');
            if (timeEl) timeEl.textContent = new Date().toLocaleTimeString();

            // Dash stats
            const du = document.getElementById('dash-users');
            if (du) du.textContent = allUsers.length.toString();

            const totalCoins = allUsers.reduce((sum, u) => sum + (u.coins || 0), 0);
            const dc = document.getElementById('dash-coins');
            if (dc) dc.textContent = fmt(totalCoins);

            const reqs = loadWithdrawals();
            const dw = document.getElementById('dash-withdraws');
            if (dw) dw.textContent = reqs.filter(r => r.status === 'pending').length.toString();

            // User Data Table
            const usersTbody = document.getElementById('users-tbody');
            if (usersTbody) {
                if (allUsers.length === 0) {
                    usersTbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text2);padding:20px;">No registered users found. Only logged-in users are stored.</td></tr>';
                } else {
                    usersTbody.innerHTML = allUsers.map((u, i) => `
                        <tr id="user-row-${u.userId || i}">
                            <td style="padding:10px;">${i + 1}</td>
                            <td>Lvl ${u.level || 1} <span style="font-size:0.7rem; color:var(--text3);">(ID: ${u.userId || 'N/A'})</span></td>
                            <td>${u.nickname || u.username}</td>
                            <td style="color:var(--gold); font-weight:800;">${fmt(u.coins)}</td>
                            <td style="text-align:right;">
                                <button class="danger-btn" onclick="removeUser('${u.username}')" style="padding:4px 8px; font-size:0.75rem;">Delete</button>
                            </td>
                        </tr>
                    `).join('');
                }
            }

            // Tasks 
            renderTasks();

            // Withdrawals
            renderWithdrawals();
        }

        window.removeUser = function (username) {
            if (confirm("Delete this user?")) {
                let cloudUsers = JSON.parse(localStorage.getItem('hsAdminUsersList') || '[]');
                cloudUsers = cloudUsers.filter(u => u.username !== username);
                localStorage.setItem('hsAdminUsersList', JSON.stringify(cloudUsers));

                // If it's the currently logged-in user locally, log them out
                if (localStorage.getItem('hsGlobalUsername') === username) {
                    localStorage.removeItem('hammerStrikeSave');
                    localStorage.removeItem('hsGlobalUsername');
                    localStorage.removeItem('hsGlobalPassword');
                    localStorage.removeItem('hsGlobalEmail');
                    localStorage.removeItem('hsGlobalPhone');
                    localStorage.removeItem('hammerStrikeUserRegistered');
                    sessionStorage.removeItem('hammerStrikeUserLoggedIn');
                }

                render();
            }
        };

        window.deleteUser = function () {
            const pass = prompt("Enter Password to delete ALL user data:");
            if (pass === '0911') {
                if (confirm("Are you sure you want to permanently delete ALL player save data?")) {
                    localStorage.removeItem('hammerStrikeSave');
                    localStorage.removeItem('hsGlobalUsername');
                    localStorage.removeItem('hsGlobalPassword');
                    localStorage.removeItem('hsGlobalEmail');
                    localStorage.removeItem('hsGlobalPhone');
                    localStorage.removeItem('hammerStrikeUserRegistered');
                    localStorage.removeItem('hsCustomAvatar');
                    localStorage.removeItem('hammerStrikeAds');
                    localStorage.removeItem('hammerStrikeRefsDaily');
                    localStorage.removeItem('hammerStrikeAllUsers');
                    localStorage.removeItem('hsAdminUsersList'); // Clear simulated list
                    sessionStorage.removeItem('hammerStrikeUserLoggedIn');
                    render();
                    alert('User data has been completely erased! A new user can now register.');
                }
            }
        }

        // Listen for storage changes (real-time sync between tabs)
        window.addEventListener('storage', (e) => {
            if (e.key === 'hammerStrikeSave' || e.key === 'hammerStrikeAllUsers') {
                render();
            }
        });

        // Task Management
        window.uploadTask = function () {
            const title = document.getElementById('task-title').value;
            const reward = document.getElementById('task-reward').value;
            const link = document.getElementById('task-link').value;
            if (!title || !reward || !link) return alert("Please fill all fields");

            const tasks = loadTasks();
            tasks.push({ id: Date.now(), title, reward: parseInt(reward), link });
            saveTasks(tasks);

            document.getElementById('task-title').value = '';
            document.getElementById('task-reward').value = '';
            document.getElementById('task-link').value = '';
            renderTasks();
        }

        window.removeTask = function (id) {
            let tasks = loadTasks();
            tasks = tasks.filter(t => t.id !== id);
            saveTasks(tasks);
            renderTasks();
        }

        function renderTasks() {
            const tb = document.getElementById('tasks-container');
            if (!tb) return;
            const tasks = loadTasks();
            if (tasks.length === 0) {
                tb.innerHTML = '<div style="color:var(--text2);text-align:center;padding:20px;">No active tasks uploaded yet.</div>';
            } else {
                tb.innerHTML = tasks.map(t => `
            < div class="quest-row" >
                        <div class="quest-icon">📝</div>
                        <div class="quest-info">
                            <div class="quest-name">${t.title}</div>
                            <div class="quest-pct" style="color:var(--gold);">Reward: ${t.reward} 🪙 | <a href="${t.link}" style="color:var(--blue);" target="_blank">Link</a></div>
                        </div>
                        <div><button class="danger-btn" onclick="removeTask(${t.id})" style="padding:5px 10px;">Remove</button></div>
                    </div >
            `).join('');
            }
        }

        // Withdrawals Management
        window.handleWithdrawAction = function (id, action) {
            let reqs = loadWithdrawals();
            reqs = reqs.map(r => {
                if (r.id === id) r.status = action;
                return r;
            });
            saveWithdrawals(reqs);
            renderWithdrawals();
        }

        function renderWithdrawals() {
            const wtb = document.getElementById('withdrew-tbody');
            if (!wtb) return;
            const reqs = loadWithdrawals();

            if (reqs.length === 0) {
                wtb.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text2);padding:20px;">No withdrawal requests found. Submit a request from the game to test.</td></tr>';
            } else {
                wtb.innerHTML = reqs.map(r => {
                    let actions = '';
                    if (r.status === 'pending') {
                        actions = `
            < button class="danger-btn" onclick = "handleWithdrawAction(${r.id}, 'approved')" style = "background:#2ecc71; color:#fff; border:none; padding:5px 10px; margin-right:5px;" > Approve</button >
                <button class="danger-btn" onclick="handleWithdrawAction(${r.id}, 'rejected')" style="padding:5px 10px;">Reject</button>
        `;
                    } else if (r.status === 'approved') {
                        actions = '<span class="badge badge-green">Approved</span>';
                    } else if (r.status === 'rejected') {
                        actions = '<span class="badge badge-red">Rejected</span>';
                    }

                    return `
            < tr >
                        <td style="padding:10px;">#REQ-${r.id.toString().slice(-4)}</td>
                        <td>#1001</td>
                        <td>${r.upi || 'user@upi'}</td>
                        <td style="color:var(--gold);">${fmt(r.amount)}</td>
                        <td style="color:#2ecc71;">₹${(r.amount / 10).toFixed(2)}</td>
                        <td style="text-align:right;">${actions}</td>
                    </tr >
                `;
                }).join('');
            }
        }

        setInterval(render, 3000);
        render(); // Initial call
    </script>

    <script>
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.expand();
            window.Telegram.WebApp.ready();
        }

        function openMenu() {
            var menu = document.getElementById('side-menu');
            var overlay = document.getElementById('menu-overlay');
            if (menu && overlay) {
                menu.style.transform = 'translateX(0)';
                overlay.style.display = 'block';
            }
        }
        function closeMenu() {
            var menu = document.getElementById('side-menu');
            var overlay = document.getElementById('menu-overlay');
            if (menu && overlay) {
                menu.style.transform = 'translateX(100%)';
                overlay.style.display = 'none';
            }
        }
        function adminLogout() {
            localStorage.removeItem('hammerStrikeAdminLoggedIn');
            window.location.href = 'index.html';
        }
    </script>
    </main>


    <div class="menu-overlay" id="menu-overlay" onclick="closeMenu()"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); z-index: 2900; display: none;">
    </div>
    <div class="side-menu" id="side-menu"
        style="position: fixed; top: 0; right: 0; width: 250px; height: 100%; background: #141727; border-left: 1px solid rgba(255, 255, 255, 0.07); box-shadow: -5px 0 20px rgba(0,0,0,0.5); z-index: 3000; padding: 20px; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: #ffffff; font-family: 'Inter', sans-serif;">
        <div
            style="font-size: 1.2rem; font-weight: 800; color: #ffd700; margin-bottom: 20px; display:flex; justify-content:space-between; align-items:center;">
            <span>☰ Menu</span>
            <span onclick="closeMenu()" style="cursor:pointer; font-size:1.5rem;">×</span>
        </div>
        <a href="admin_dashboard.html" class="menu-item"
            style="display: block; padding: 12px 10px; color: #ffffff; text-decoration: none; font-weight: 600; border-bottom: 1px solid rgba(255, 255, 255, 0.07); margin-bottom: 5px;">📊
            Dashboard</a>
        <a href="admin_usersdata.html" class="menu-item"
            style="display: block; padding: 12px 10px; color: #ffffff; text-decoration: none; font-weight: 600; border-bottom: 1px solid rgba(255, 255, 255, 0.07); margin-bottom: 5px;">👥
            Users</a>
        <a href="admin_task.html" class="menu-item"
            style="display: block; padding: 12px 10px; color: #ffffff; text-decoration: none; font-weight: 600; border-bottom: 1px solid rgba(255, 255, 255, 0.07); margin-bottom: 5px;">📋
            Tasks</a>
        <a href="admin_leaderboard.html" class="menu-item"
            style="display: block; padding: 12px 10px; color: #ffffff; text-decoration: none; font-weight: 600; border-bottom: 1px solid rgba(255, 255, 255, 0.07); margin-bottom: 5px;">🏆
            Rankings</a>
        <a href="admin_withdraw.html" class="menu-item"
            style="display: block; padding: 12px 10px; color: #ffffff; text-decoration: none; font-weight: 600; border-bottom: 1px solid rgba(255, 255, 255, 0.07); margin-bottom: 5px;">💸
            Funds</a>
        <a href="user_stone.html" class="menu-item"
            style="display: block; padding: 12px 10px; color: #ffd700; text-decoration: none; font-weight: 700; margin-top: 20px;">🎮
            Exit to Game</a>
    </div>
    <!-- Firebase System -->

</body>

</html>

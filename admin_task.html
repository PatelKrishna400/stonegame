<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Game — Admin Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0d0f1a;
            --surface: #141727;
            --surface2: #1c2136;
            --border: rgba(255, 255, 255, 0.07);
            --gold: #ffd700;
            --gold2: #ff8c00;
            --blue: #64c8ff;
            --pink: #ff64c8;
            --green: #27ae60;
            --red: #e74c3c;
            --purple: #8e44ad;
            --text: #ffffff;
            --text2: rgba(255, 255, 255, 0.5);
            --text3: rgba(255, 255, 255, 0.25);
        }

        html {
            background: #0d0f1a;
        }

        body {
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        /* HEADER & BOTTOM NAV */
        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 20px;
            background: rgba(20, 23, 39, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .main {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 20px;
        }











        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .page-subtitle {
            color: var(--text2);
            font-size: 0.8rem;
            margin-top: 2px;
        }

        /* COMPONENTS */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 20px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 215, 0, 0.2);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, var(--card-accent, rgba(255, 215, 0, 0.08)), transparent 70%);
            border-radius: 50%;
        }

        .stat-label {
            color: var(--text2);
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.9rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 6px;
        }

        .stat-sub {
            font-size: 0.72rem;
            color: var(--text2);
        }

        .stat-icon {
            position: absolute;
            top: 16px;
            right: 18px;
            font-size: 1.6rem;
            opacity: 0.6;
        }

        .section-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .grid-2 {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .detail-table {
            width: 100%;
            border-collapse: collapse;
        }

        .detail-table tr {
            border-bottom: 1px solid var(--border);
        }

        .detail-table tr:last-child {
            border-bottom: none;
        }

        .detail-table td,
        .detail-table th {
            padding: 11px 0;
            font-size: 0.83rem;
            color: white;
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .badge-green {
            background: rgba(39, 174, 96, 0.2);
            color: #2ecc71;
        }

        .badge-red {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }

        .badge-gray {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text2);
        }

        .danger-btn {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.35);
            border-radius: 10px;
            padding: 8px 16px;
            color: #e74c3c;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .danger-btn:hover {
            background: rgba(231, 76, 60, 0.25);
        }

        .quest-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .quest-row:last-child {
            border-bottom: none;
        }

        .quest-icon {
            font-size: 1.3rem;
        }

        .quest-name {
            font-size: 0.83rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--gold);
        }

        .quest-pct {
            font-size: 0.72rem;
            color: var(--text2);
        }

        input {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body>


    <header
        style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(20, 23, 39, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.07); position: sticky; top: 0; z-index: 2000;">
        <div class="logo"
            style="font-size: 1.2rem; font-weight: 800; color: #ffd700; letter-spacing: 2px; text-transform: uppercase;">
            Admin Admin</div>
        <div class="header-right" style="display:flex; align-items:center; gap:10px;">
            <button class="logout-btn" onclick="adminLogout()"
                style="background: rgba(231, 76, 60, 0.1); border: 1px solid rgba(231, 76, 60, 0.35); padding: 6px 12px; border-radius: 8px; color: #e74c3c; font-size: 0.8rem; font-weight: 700; cursor: pointer; text-decoration: none;">Logout</button>
            <div class="menu-btn" onclick="openMenu()"
                style="background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.07); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; color: #ffd700;">
                ☰</div>
        </div>
    </header>



    <main class="main">
        <div class="page active">
            <div class="page-header">
                <div>
                    <div class="page-title">📝 Task Uploading</div>
                    <div class="page-subtitle">Create and manage real-time tasks for your users</div>
                </div>
            </div>

            <div class="grid-2">
                <div class="section-card">
                    <div class="section-title">➕ Create New Task</div>
                    <div style="display:flex;flex-direction:column;gap:15px;margin-top:20px;">
                        <div>
                            <label style="font-size:0.8rem;color:var(--text2);display:block;margin-bottom:5px;">Task
                                Title</label>
                            <input type="text" id="task-title" placeholder="e.g. Join Telegram Group"
                                style="width:100%; padding:10px; border-radius:8px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; outline:none;">
                        </div>
                        <div>
                            <label style="font-size:0.8rem;color:var(--text2);display:block;margin-bottom:5px;">Reward
                                Amount (Energy)</label>
                            <input type="number" id="task-reward" placeholder="50"
                                style="width:100%; padding:10px; border-radius:8px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; outline:none;">
                        </div>
                        <div>
                            <label style="font-size:0.8rem;color:var(--text2);display:block;margin-bottom:5px;">Link
                                URL</label>
                            <input type="text" id="task-link" placeholder="https://t.me/hammerstrike"
                                style="width:100%; padding:10px; border-radius:8px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; outline:none;">
                        </div>
                        <div style="display:flex; gap:10px;">
                            <div style="flex:1;">
                                <label style="font-size:0.8rem;color:var(--text2);display:block;margin-bottom:5px;">Task
                                    Type</label>
                                <select id="task-type" onchange="toggleTaskFields()"
                                    style="width:100%; padding:10px; border-radius:8px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; outline:none;">
                                    <option value="website">Website</option>
                                    <option value="youtube">YouTube</option>
                                </select>
                            </div>
                            <div style="flex:1;">
                                <select id="task-timer"
                                    style="width:100%; padding:10px; border-radius:8px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; outline:none;">
                                    <option value="15">15 sec</option>
                                    <option value="30">30 sec</option>
                                    <option value="60">60 sec</option>
                                    <option value="120">120 sec</option>
                                </select>
                            </div>
                            <div style="flex:1;">
                                <label
                                    style="font-size:0.8rem;color:var(--text2);display:block;margin-bottom:5px;">Verify
                                    Code (Empty=None)</label>
                                <input type="number" id="task-verify-code" placeholder="Enter Verify Code"
                                    style="width:100%; padding:10px; border-radius:8px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; outline:none;">
                            </div>
                        </div>

                        <!-- YouTube Quiz Fields -->
                        <div id="quiz-fields" style="display:none; flex-direction:column; gap:10px;">
                            <div style="border-top: 1px solid var(--border); padding-top:10px; margin-top:5px;">
                                <label style="font-size:0.8rem;color:var(--gold);display:block;margin-bottom:5px;">Quiz
                                    Verification</label>
                                <input type="text" id="q1" placeholder="Question 1 (e.g. Code in video?)"
                                    style="width:100%; padding:10px; border-radius:8px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; outline:none; margin-bottom:5px;">
                                <input type="text" id="a1" placeholder="Answer 1"
                                    style="width:100%; padding:10px; border-radius:8px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; outline:none;">
                            </div>
                            <div>
                                <input type="text" id="q2" placeholder="Question 2"
                                    style="width:100%; padding:10px; border-radius:8px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; outline:none; margin-bottom:5px;">
                                <input type="text" id="a2" placeholder="Answer 2"
                                    style="width:100%; padding:10px; border-radius:8px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; outline:none;">
                            </div>
                        </div>
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <button class="danger-btn" id="btn-submit-task" onclick="uploadTask()"
                                style="flex:1; background:#2ecc71; color:#fff; border:none; padding:12px;">Upload
                                Task</button>
                            <button class="danger-btn" id="btn-cancel-task" onclick="cancelEditTask()"
                                style="display:none; flex:1; background:#e74c3c; color:#fff; border:none; padding:12px;">Cancel</button>
                        </div>
                    </div>
                </div>
                <div class="section-card">
                    <div class="section-title">📋 Active Live Tasks</div>
                    <div id="tasks-container">
                        <div style="color:var(--text2);text-align:center;padding:20px;">Loading tasks...</div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        function loadSave() {
            const raw = localStorage.getItem('hammerStrikeSave');
            if (!raw) return null;
            try { return JSON.parse(raw); } catch (e) { return null; }
        }
        function fmt(n) { return Number(n || 0).toLocaleString(); }

        function loadTasks() {
            const raw = localStorage.getItem('hammerStrikeAdminTasks');
            if (!raw) return [];
            try { return JSON.parse(raw); } catch (e) { return []; }
        }
        function saveTasks(tasks) {
            localStorage.setItem('hammerStrikeAdminTasks', JSON.stringify(tasks));
        }

        function loadWithdrawals() {
            const raw = localStorage.getItem('hammerStrikeWithdrawals');
            if (!raw) return [];
            try { return JSON.parse(raw); } catch (e) { return []; }
        }
        function saveWithdrawals(reqs) {
            localStorage.setItem('hammerStrikeWithdrawals', JSON.stringify(reqs));
        }

        let isRenderedOnce = false;

        function render() {
            renderTasks();
            renderWithdrawals();
        }

        window.deleteUser = function () {
            if (confirm("Are you sure you want to permanently delete the player save data?")) {
                localStorage.removeItem('hammerStrikeSave');
                render();
            }
        }

        // Task Management
        let editingTaskId = null;

        window.uploadTask = function () {
            const title = document.getElementById('task-title').value;
            const reward = document.getElementById('task-reward').value;
            const link = document.getElementById('task-link').value;
            const type = document.getElementById('task-type').value;
            const timer = document.getElementById('task-timer').value || 30;
            const verifyCode = document.getElementById('task-verify-code').value || '';

            const q1 = document.getElementById('q1').value;
            const a1 = document.getElementById('a1').value;
            const q2 = document.getElementById('q2').value;
            const a2 = document.getElementById('a2').value;

            if (!title || !reward || !link) return alert("Please fill all fields");

            const tasks = loadTasks();

            const taskObj = {
                id: editingTaskId || Date.now(),
                title,
                reward: parseInt(reward),
                link,
                type,
                timer: parseInt(timer),
                verifyCode: verifyCode,
                quiz: type === 'youtube' ? { q1, a1, q2, a2 } : null
            };

            if (editingTaskId) {
                const idx = tasks.findIndex(t => t.id === editingTaskId);
                if (idx > -1) tasks[idx] = taskObj;
                editingTaskId = null;
                document.getElementById('btn-submit-task').innerText = 'Upload Task';
                document.getElementById('btn-cancel-task').style.display = 'none';
            } else {
                tasks.push(taskObj);
            }

            saveTasks(tasks);
            clearInputs();
            renderTasks();
        }

        function toggleTaskFields() {
            const type = document.getElementById('task-type').value;
            document.getElementById('quiz-fields').style.display = (type === 'youtube') ? 'flex' : 'none';
        }

        function clearInputs() {
            document.getElementById('task-title').value = '';
            document.getElementById('task-reward').value = '';
            document.getElementById('task-link').value = '';
            document.getElementById('task-timer').value = '';
            document.getElementById('task-verify-code').value = '';
            document.getElementById('q1').value = '';
            document.getElementById('a1').value = '';
            document.getElementById('q2').value = '';
            document.getElementById('a2').value = '';
        }

        window.editTask = function (id) {
            const tasks = loadTasks();
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            document.getElementById('task-title').value = task.title;
            document.getElementById('task-reward').value = task.reward;
            document.getElementById('task-link').value = task.link;
            document.getElementById('task-type').value = task.type || 'website';
            document.getElementById('task-timer').value = task.timer || 30;
            document.getElementById('task-verify-code').value = task.verifyCode || '';

            if (task.quiz) {
                document.getElementById('q1').value = task.quiz.q1 || '';
                document.getElementById('a1').value = task.quiz.a1 || '';
                document.getElementById('q2').value = task.quiz.q2 || '';
                document.getElementById('a2').value = task.quiz.a2 || '';
            }

            toggleTaskFields();

            editingTaskId = id;
            document.getElementById('btn-submit-task').innerText = 'Save Changes';
            document.getElementById('btn-cancel-task').style.display = 'block';
        }

        window.cancelEditTask = function () {
            editingTaskId = null;
            clearInputs();
            document.getElementById('btn-submit-task').innerText = 'Upload Task';
            document.getElementById('btn-cancel-task').style.display = 'none';
            toggleTaskFields();
        }

        window.removeTask = function (id) {
            let tasks = loadTasks();
            tasks = tasks.filter(t => t.id !== id);
            saveTasks(tasks);
            renderTasks();
        }

        function renderTasks() {
            const tb = document.getElementById('tasks-container');
            if (!tb) return;
            const tasks = loadTasks();
            if (tasks.length === 0) {
                tb.innerHTML = '<div style="color:var(--text2);text-align:center;padding:20px;">No active tasks uploaded yet.</div>';
            } else {
                tb.innerHTML = tasks.map(t => {
                    const typeLabel = (t.type === 'youtube' ? '📺 YouTube' : '🌐 Website');
                    return `
                    <div class="quest-row">
                        <div class="quest-icon">${t.type === 'youtube' ? '🎬' : '📝'}</div>
                        <div class="quest-info" style="flex:1;">
                            <div class="quest-name">${t.title}</div>
                            <div style="font-size:0.7rem; color:var(--text2); margin-top:-2px; margin-bottom:4px;">${typeLabel} • ${t.timer || 0}s</div>
                            <div class="quest-pct" style="color:var(--gold);">Reward: ${t.reward} ⚡ | <a href="${t.link}" style="color:var(--blue);" target="_blank">Link</a></div>
                        </div>
                        <div style="display:flex; flex-direction:column; gap:5px;">
                            <button class="danger-btn" onclick="editTask(${t.id})" style="padding:5px 10px; background:#f39c12; border:none; color:white;">Edit</button>
                            <button class="danger-btn" onclick="removeTask(${t.id})" style="padding:5px 10px;">Remove</button>
                        </div>
                    </div>
                `;
                }).join('');
            }
        }

        // Withdrawals Management
        window.handleWithdrawAction = function (id, action) {
            let reqs = loadWithdrawals();
            reqs = reqs.map(r => {
                if (r.id === id) r.status = action;
                return r;
            });
            saveWithdrawals(reqs);
            renderWithdrawals();
        }

        function renderWithdrawals() {
            const wtb = document.getElementById('withdrew-tbody');
            if (!wtb) return;
            const reqs = loadWithdrawals();

            if (reqs.length === 0) {
                wtb.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text2);padding:20px;">No withdrawal requests found. Submit a request from the game to test.</td></tr>';
            } else {
                wtb.innerHTML = reqs.map(r => {
                    let actions = '';
                    if (r.status === 'pending') {
                        actions = `
                            <button class="danger-btn" onclick="handleWithdrawAction(${r.id}, 'approved')" style="background:#2ecc71; color:#fff; border:none; padding:5px 10px; margin-right:5px;">Approve</button>
                            <button class="danger-btn" onclick="handleWithdrawAction(${r.id}, 'rejected')" style="padding:5px 10px;">Reject</button>
                        `;
                    } else if (r.status === 'approved') {
                        actions = '<span class="badge badge-green">Approved</span>';
                    } else if (r.status === 'rejected') {
                        actions = '<span class="badge badge-red">Rejected</span>';
                    }

                    return `
                    <tr>
                        <td style="padding:10px;">#REQ-${r.id.toString().slice(-4)}</td>
                        <td>#1001</td>
                        <td>${r.upi || 'user@upi'}</td>
                        <td style="color:var(--gold);">${fmt(r.amount)}</td>
                        <td style="color:#2ecc71;">₹${(r.amount / 10).toFixed(2)}</td>
                        <td style="text-align:right;">${actions}</td>
                    </tr>
                `;
                }).join('');
            }
        }

        setInterval(render, 3000);
        render(); // Initial call
    </script>

    <script>
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.expand();
            window.Telegram.WebApp.ready();
        }

        function openMenu() {
            var menu = document.getElementById('side-menu');
            var overlay = document.getElementById('menu-overlay');
            if (menu && overlay) {
                menu.style.transform = 'translateX(0)';
                overlay.style.display = 'block';
            }
        }
        function closeMenu() {
            var menu = document.getElementById('side-menu');
            var overlay = document.getElementById('menu-overlay');
            if (menu && overlay) {
                menu.style.transform = 'translateX(100%)';
                overlay.style.display = 'none';
            }
        }
        function adminLogout() {
            localStorage.removeItem('hammerStrikeAdminLoggedIn');
            window.location.href = 'index.html';
        }
    </script>
    </main>


    <div class="menu-overlay" id="menu-overlay" onclick="closeMenu()"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); z-index: 2900; display: none;">
    </div>
    <div class="side-menu" id="side-menu"
        style="position: fixed; top: 0; right: 0; width: 250px; height: 100%; background: #141727; border-left: 1px solid rgba(255, 255, 255, 0.07); box-shadow: -5px 0 20px rgba(0,0,0,0.5); z-index: 3000; padding: 20px; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: #ffffff; font-family: 'Inter', sans-serif;">
        <div
            style="font-size: 1.2rem; font-weight: 800; color: #ffd700; margin-bottom: 20px; display:flex; justify-content:space-between; align-items:center;">
            <span>☰ Menu</span>
            <span onclick="closeMenu()" style="cursor:pointer; font-size:1.5rem;">×</span>
        </div>
        <a href="admin_dashboard.html" class="menu-item"
            style="display: block; padding: 12px 10px; color: #ffffff; text-decoration: none; font-weight: 600; border-bottom: 1px solid rgba(255, 255, 255, 0.07); margin-bottom: 5px;">📊
            Dashboard</a>
        <a href="admin_usersdata.html" class="menu-item"
            style="display: block; padding: 12px 10px; color: #ffffff; text-decoration: none; font-weight: 600; border-bottom: 1px solid rgba(255, 255, 255, 0.07); margin-bottom: 5px;">👥

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Game — Admin Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0d0f1a;
            --surface: #141727;
            --surface2: #1c2136;
            --border: rgba(255, 255, 255, 0.07);
            --gold: #ffd700;
            --gold2: #ff8c00;
            --blue: #64c8ff;
            --pink: #ff64c8;
            --green: #27ae60;
            --red: #e74c3c;
            --purple: #8e44ad;
            --text: #ffffff;
            --text2: rgba(255, 255, 255, 0.5);
            --text3: rgba(255, 255, 255, 0.25);
        }

        html {
            background: #0d0f1a;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            padding-bottom: 70px;
        }

        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        /* SIDEBAR */
        .sidebar {
            width: 100%;
            min-height: auto;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 100;
            padding-bottom: 15px;
            flex-shrink: 0;
        }

        .sidebar-logo {
            padding: 22px 20px 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-logo h1 {
            font-size: 1.05rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--gold), var(--gold2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .sidebar-logo p {
            color: var(--text2);
            font-size: 0.7rem;
            margin-top: 3px;
        }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(39, 174, 96, 0.15);
            border: 1px solid rgba(39, 174, 96, 0.35);
            border-radius: 20px;
            padding: 3px 9px;
            font-size: 0.65rem;
            color: #2ecc71;
            font-weight: 600;
            margin-top: 8px;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #2ecc71;
            animation: livePulse 1.2s ease-in-out infinite;
        }

        @keyframes livePulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(0.7);
            }
        }

        .nav-section {
            padding: 14px 12px 6px;
            font-size: 0.62rem;
            font-weight: 700;
            color: var(--text3);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            margin: 2px 8px;
            border-radius: 10px;
            color: var(--text2);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(255, 215, 0, 0.1);
            color: var(--gold);
        }

        .nav-item .icon {
            font-size: 1rem;
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 16px;
            border-top: 1px solid var(--border);
        }

        .last-sync {
            font-size: 0.68rem;
            color: var(--text3);
            text-align: center;
        }

        .last-sync span {
            color: var(--blue);
            font-weight: 600;
        }

        /* MAIN */
        .main {
            margin-left: 0;
            flex: 1;
            padding: 15px;
            min-height: auto;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .page-subtitle {
            color: var(--text2);
            font-size: 0.8rem;
            margin-top: 2px;
        }

        /* COMPONENTS */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 20px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 215, 0, 0.2);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, var(--card-accent, rgba(255, 215, 0, 0.08)), transparent 70%);
            border-radius: 50%;
        }

        .stat-label {
            color: var(--text2);
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.9rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 6px;
        }

        .stat-sub {
            font-size: 0.72rem;
            color: var(--text2);
        }

        .stat-icon {
            position: absolute;
            top: 16px;
            right: 18px;
            font-size: 1.6rem;
            opacity: 0.6;
        }

        .section-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .grid-2 {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .detail-table {
            width: 100%;
            border-collapse: collapse;
        }

        .detail-table tr {
            border-bottom: 1px solid var(--border);
        }

        .detail-table tr:last-child {
            border-bottom: none;
        }

        .detail-table td,
        .detail-table th {
            padding: 11px 0;
            font-size: 0.83rem;
            color: white;
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .badge-green {
            background: rgba(39, 174, 96, 0.2);
            color: #2ecc71;
        }

        .badge-red {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }

        .badge-gray {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text2);
        }

        .danger-btn {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.35);
            border-radius: 10px;
            padding: 8px 16px;
            color: #e74c3c;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .danger-btn:hover {
            background: rgba(231, 76, 60, 0.25);
        }

        .quest-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .quest-row:last-child {
            border-bottom: none;
        }

        .quest-icon {
            font-size: 1.3rem;
        }

        .quest-name {
            font-size: 0.83rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--gold);
        }

        .quest-pct {
            font-size: 0.72rem;
            color: var(--text2);
        }

        input {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body
    style="align-items:center; justify-content:center; background: radial-gradient(circle at 50% 50%, #1a1e36, #0d0f1a);">
    <div class="section-card"
        style="width: 100%; max-width: 380px; text-align: center; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 16px;">
        <h1 style="color:var(--gold); margin-bottom: 5px; font-size:1.8rem; font-weight:800; letter-spacing:1px;">🪨
            STONE GAME</h1>
        <p style="color:var(--text2); margin-bottom: 30px; font-size: 0.85rem; letter-spacing:0.5px;">Admin Login Panel
        </p>

        <div style="text-align:left; margin-bottom:20px;">
            <label style="font-size:0.8rem;color:var(--text2);display:block;margin-bottom:5px;">Admin Username</label>
            <input type="text" id="admin-user" placeholder="admin"
                style="width:100%; padding:12px; border-radius:8px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:white; outline:none; font-family:'Inter', sans-serif;">
        </div>
        <div style="text-align:left; margin-bottom:30px;">
            <label style="font-size:0.8rem;color:var(--text2);display:block;margin-bottom:5px;">Password</label>
            <input type="password" id="admin-pass" placeholder="••••••••"
                style="width:100%; padding:12px; border-radius:8px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:white; outline:none; font-family:'Inter', sans-serif;">
        </div>

        <button onclick="attemptAdminLogin()" class="danger-btn"
            style="background:linear-gradient(135deg, var(--gold), var(--gold2)); color:#1a1a2e; border:none; padding:12px 0; width:100%; display:block; text-decoration:none; text-align:center; font-weight:800; text-transform:uppercase; letter-spacing:1px; cursor:pointer;">Login</button>

        <a href="user_stone.html"
            style="display:block; margin-top:20px; font-size:0.8rem; color:var(--text3); text-decoration:none;">&larr;
            Back to Game</a>
    </div>

    <!-- ADMIN SETUP MODAL -->
    <div id="admin-setup-modal"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(5px); z-index:999; align-items:center; justify-content:center;">
        <div
            style="background:var(--surface); border:1px solid var(--border); border-radius:15px; padding:25px; width:90%; max-width:350px;">
            <h3 style="color:var(--gold); margin-bottom:10px;">Setup Secure Admin</h3>
            <p style="color:var(--text2); font-size:0.8rem; margin-bottom:20px;">Please create a new Admin Username and
                Password. The default 'admin' / 'admin@123' will be disabled.</p>
            <input type="text" id="new-admin-user" placeholder="New Username"
                style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; outline:none;">
            <input type="password" id="new-admin-pass" placeholder="New Password"
                style="width:100%; padding:10px; margin-bottom:20px; border-radius:8px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; outline:none;">
            <button onclick="saveNewAdminCreds()"
                style="background:linear-gradient(135deg, #27ae60, #2ecc71); color:white; font-weight:bold; border:none; padding:10px; width:100%; border-radius:8px; cursor:pointer;">Save
                & Continue</button>
        </div>
    </div>

    <script>
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.expand();
            window.Telegram.WebApp.ready();
        }

        // Auto popup setup modal after 1 minute if custom admin is not configured
        if (!localStorage.getItem('hsAdminUser')) {
            setTimeout(() => {
                document.getElementById('admin-setup-modal').style.display = 'flex';
            }, 60000);
        }

        function attemptAdminLogin() {
            const u = document.getElementById('admin-user').value;
            const p = document.getElementById('admin-pass').value;

            const customUser = localStorage.getItem('hsAdminUser');
            const customPass = localStorage.getItem('hsAdminPass');

            if (!customUser) {
                // First time check
                if (u === 'admin' && p === 'admin@123') {
                    document.getElementById('admin-setup-modal').style.display = 'flex';
                } else {
                    alert('Invalid credentials!');
                }
            } else {
                // Custom creds check
                if (u === customUser && p === customPass) {
                    localStorage.setItem('hammerStrikeAdminLoggedIn', 'true');
                    window.location.href = 'admin_dashboard.html';
                } else {
                    alert('Invalid custom credentials!');
                }
            }
        }

        function saveNewAdminCreds() {
            const nu = document.getElementById('new-admin-user').value.trim();
            const np = document.getElementById('new-admin-pass').value.trim();

            if (!nu || !np) {
                alert('Please enter both username and password!');
                return;
            }

            localStorage.setItem('hsAdminUser', nu);
            localStorage.setItem('hsAdminPass', np);
            localStorage.setItem('hammerStrikeAdminLoggedIn', 'true');

            alert('Admin credentials updated! The default login is now disabled.');
            window.location.href = 'admin_dashboard.html';
        }
    </script>
</body>

</html>

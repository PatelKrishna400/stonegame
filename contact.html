<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hammer Strike — Contact Us</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0d0f1a;
            --surface: #141727;
            --border: rgba(255, 255, 255, 0.07);
            --gold: #ffd700;
            --gold2: #ff8c00;
            --text: #ffffff;
            --text2: rgba(255, 255, 255, 0.5);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .contact-card {
            background: linear-gradient(135deg, rgba(20, 23, 39, 0.9), rgba(28, 33, 54, 0.9));
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px 25px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        .title {
            color: var(--gold);
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 5px;
            text-align: center;
        }

        .subtitle {
            color: var(--text2);
            font-size: 0.85rem;
            margin-bottom: 25px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text2);
            margin-bottom: 8px;
            font-weight: 600;
        }

        select,
        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: white;
            outline: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        select option {
            background: var(--surface);
            color: white;
        }

        .btn-send {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            font-weight: 800;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-back {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text2);
            text-decoration: none;
            font-size: 0.85rem;
        }
    </style>
    <meta name="monetag" content="f15c9aa6cd721474b07b0a0f974d06b8">
    <script src='//libtl.com/sdk.js' data-zone='10676091' data-sdk='show_10676091'></script>
</head>

<body>
    <div class="contact-card">
        <div class="title">📧 Contact Us</div>
        <div class="subtitle">Select a topic and submit your details.</div>

        <div class="input-group">
            <label>What do you need help with?</label>
            <select id="issue-topic">
                <option value="Game Page Issue">Game Page (Hammer, Energy, Limits)</option>
                <option value="Upgrades Issue">Upgrades (Tap Power, Offline Recharge)</option>
                <option value="Wallet / Withdraw Issue">Wallet / Withdraw (QR, Payments)</option>
                <option value="Tasks / Ads Issue">Tasks & Ads</option>
                <option value="Profile Issue">Profile / Account Settings</option>
                <option value="Other Issue">Other Inquiry</option>
            </select>
        </div>

        <div class="input-group" id="detail-group">
            <label>Explain your issue in detail:</label>
            <textarea id="issue-detail" placeholder="Please describe the issue you are facing..."></textarea>
        </div>

        <button class="btn-send" onclick="sendMail()">
            <span>Send Email</span>
            <span>🚀</span>
        </button>

        <a href="profile.html" class="btn-back">&larr; Back to Profile</a>
    </div>

    <script>
    function checkAuth() {
        const isIndex = window.location.pathname.endsWith('index.html') || window.location.pathname.endsWith('/');
        const loggedIn = sessionStorage.getItem('hammerStrikeUserLoggedIn') === 'true';
        const hasData = localStorage.getItem('hammerStrikeSave') !== null;
        
        if (isIndex) {
            if (loggedIn && hasData) {
                window.location.href = 'user_stone.html';
            }
        } else {
            if (!loggedIn || !hasData) {
                window.location.href = 'index.html';
            }
        }
    }
    checkAuth();
    window.addEventListener('storage', (e) => {
        if (e.key === 'hammerStrikeSave' && e.newValue === null) {
            window.location.href = 'index.html';
        }
    });

        function sendMail() {
            const topic = document.getElementById('issue-topic').value;
            const details = document.getElementById('issue-detail').value;

            if (!details.trim()) {
                alert("Please provide some details before sending.");
                return;
            }

            const storedUser = localStorage.getItem('hsGlobalUsername') || "Guest";
            const subject = encodeURIComponent(`Hammer Strike Support - ${topic}`);
            const body = encodeURIComponent(`Username: ${storedUser}\nTopic: ${topic}\n\nDetails:\n${details}`);

            const mailtoLink = `mailto:patelkishnam0911@gamil.com?subject=${subject}&body=${body}`;
            window.location.href = mailtoLink;
        }
    </script>
</body>

</html>
